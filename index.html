<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Unterrichts-Tools</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            color: #004a99;
            border-bottom: 3px solid #e67e22;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .tool-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #004a99;
        }
        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            background: #f9fbfc;
        }
        .file-name {
            word-wrap: break-word;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>Verfügbare Applikationen</h1>

    <div class="tool-grid">
        {% for file in site.static_files %}
            {% if file.path contains '/tools/' and file.extname == '.html' %}
                <a href="{{ site.baseurl }}{{ file.path }}" class="tool-card">
                    <span class="file-name">
                        {{ file.name | replace: ".html", "" | replace: "-", " " | capitalize }}
                    </span>
                </a>
            {% endif %}
        {% endfor %}
    </div>

</body>
</html>
